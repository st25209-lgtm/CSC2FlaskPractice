<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Website</title>
</head>
<body>
    <h1>Sample</h1>
    <ul>
        {% for flower, details in flower.items() %}
        <li>{{ flower }} - ${{ details['price'] }} (Stock: {{ details['stock'] }})</li>
        {% endfor %}
    </ul>

    <h1>Add-Ons</h1>
    <ul>
        {% for addon, details in addon.items() %}
        <li>{{ addon }} - {{ details['price']}} </li>
        {% endfor %}
    </ul>
</body>
</html>
