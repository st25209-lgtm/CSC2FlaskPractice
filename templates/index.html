<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Website</title>
</head>
<body>
    <h1>Sample</h1>
    <form action="{{ url_for('add_to_cart' )}}" method="post">
        <fieldset>
            <legend for="flower">Select Flowers</legend>
            <select name="flower" id="flower">
                {% for flower, details in flower.items() %}
                <option value="{{ flower }}">{{ flower }} - ${{ details['price'] }}</option>
                {% endfor %}
            </select>
            <label for="quantity">Quantity</label>
            <input type="number" name="quantity" value="1" min="1">
            <button type="submit">Add to Cart</button>
        </fieldset>
    </form>

    <h1>Add-Ons</h1>
    <ul>
        {% for addon, details in addon.items() %}
        <li>{{ addon }} - ${{ details['price'] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
